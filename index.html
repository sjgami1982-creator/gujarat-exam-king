<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ગુજરાત જનરલ નોલેજ ક્વિઝ</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-container { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h2 { text-align: center; color: #333; margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .timer-box { background: #ffeaa7; color: #d63031; font-weight: bold; padding: 6px 15px; border-radius: 20px; display: inline-block; float: right; }
        #question { font-size: 18px; font-weight: bold; margin-top: 40px; margin-bottom: 20px; text-align: left; color: #2c3e50; clear: both; }
        .option-btn { width: 100%; padding: 13px; margin: 8px 0; font-size: 16px; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #fff; text-align: left; transition: 0.2s; }
        .option-btn:hover { background: #f0f4f8; border-color: #3498db; }
        .correct { background-color: #2ecc71 !important; color: white !important; font-weight: bold; border-color: #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>ગુજરાત જનરલ નોલેજ ક્વિઝ</h2>
    <div id="quiz-box">
        <div class="timer-box">⏱️ સમય: <span id="time-left">20</span> સેકન્ડ</div>
        <p id="question_num" style="text-align:left; color:#666; font-weight:bold; margin-bottom:0;">પ્રશ્ન: 1 / 10</p>
        <p id="question">લોડ થઈ રહ્યું છે...</p>
        <div id="options"></div>
    </div>
    <div id="result-box" style="display: none; text-align:center;">
        <h3>🎉 ક્વિઝ પૂરી થઈ ગઈ!</h3>
        <p id="score-display" style="font-size:22px; font-weight:bold; color:#2c3e50;"></p>
        <button onclick="location.reload()" style="padding:12px 25px; font-size:16px; cursor:pointer; background:#3498db; color:white; border:none; border-radius:25px; font-weight:bold;">ફરીથી શરૂ કરો</button>
    </div>
</div>

<script>
    const quizData = [
        { question: "૧. ગુજરાતની સૌથી લાંબી નદી કઈ છે?", options: ["તાપી", "નર્મદા", "મહી", "સાબરમતી"], correct: 1 },
        { question: "૨. સાબરમતી આશ્રમની સ્થાપના કયા વર્ષમાં થઈ હતી?", options: ["૧૯૧૫", "૧૯૧૭", "૧૯૨૦", "૧૯૩૦"], correct: 1 },
        { question: "૩. ગુજરાતનું સૌથી મોટું બંદર કયું છે?", options: ["ભાવનગર", "પોરબંદર", "કંડલા", "વેરાવળ"], correct: 2 },
        { question: "૪. સ્ટેચ્યુ ઓફ યુનિટીની ઊંચાઈ કેટલી છે?", options: ["૧૫૨ મીટર", "૧૮૨ મીટર", "૨૦૨ મીટર", "૧૭૨ મીટર"], correct: 1 },
        { question: "૫. ગુજરાતનું રાજ્ય પક્ષી કયું છે?", options: ["મોર", "પોપટ", "ફ્લેમિંગો (સુરખાબ)", "કબૂતર"], correct: 2 },
        { question: "૬. ગિરા ધોધ કયા જિલ્લામાં આવેલો છે?", options: ["ડાંગ", "વલસાડ", "નવસારી", "તાપી"], correct: 0 },
        { question: "૭. કીર્તિ તોરણ કયા શહેરમાં આવેલું છે?", options: ["પાટણ", "વડનગર", "જૂનાગઢ", "મોઢેરા"], correct: 1 },
        { question: "૮. અક્ષરધામ મંદિર કયા શહેરમાં આવેલું છે?", options: ["અમદાવાદ", "રાજકોટ", "ગાંધીનગર", "સુરત"], correct: 2 },
        { question: "૯. ગુજરાતમાં સૂર્યમંદિર ક્યાં આવેલું છે?", options: ["મોઢેરા", "અંબાજી", "સોમનાથ", "દ્વારકા"], correct: 0 },
        { question: "૧૦. ગીર રાષ્ટ્રીય ઉદ્યાન કયા પ્રાણી માટે પ્રખ્યાત છે?", options: ["વાઘ", "સિંહ", "દીપડો", "કાળિયાર"], correct: 1 }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timer;
    let timeLeft = 20;

    function loadQuiz() {
        if (currentQuestion >= quizData.length) {
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("result-box").style.display = "block";
            document.getElementById("score-display").innerHTML = "તમારો સ્કોર: " + score + " / " + quizData.length;
            return;
        }

        const currentQuiz = quizData[currentQuestion];
        document.getElementById("question_num").innerText = "પ્રશ્ન: " + (currentQuestion + 1) + " / " + quizData.length;
        document.getElementById("question").innerText = currentQuiz.question;
        
        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = ""; 

        currentQuiz.options.forEach((option, index) => {
            const btn = document.createElement("button");
            btn.classList.add("option-btn");
            btn.innerText = option;
            btn.onclick = () => checkAnswer(btn, index);
            optionsContainer.appendChild(btn);
        });

        timeLeft = 20;
        document.getElementById("time-left").innerText = timeLeft;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("time-left").innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                currentQuestion++;
                loadQuiz();
            }
        }, 1000);
    }

    function checkAnswer(selectedBtn, selectedIndex) {
        clearInterval(timer);
        const currentQuiz = quizData[currentQuestion];
        const allButtons = document.querySelectorAll(".option-btn");
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQuiz.correct) {
            selectedBtn.classList.add("correct");
            score++;
        } else {
            selectedBtn.classList.add("wrong");
            allButtons[currentQuiz.correct].classList.add("correct");
        }

        currentQuestion++;
        setTimeout(loadQuiz, 1200);
    }

    loadQuiz();
</script>

</body>
</html>
