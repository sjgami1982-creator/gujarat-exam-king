<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ગુજરાત એક્ઝામ કિંગ ક્વિઝ</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #71b7e6, #9b59b6); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; }
        .quiz-container { background: white; width: 100%; max-width: 550px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; }
        h2 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        /* ટાઇમરની ડિઝાઇન */
        .timer-box { background: #ffeaa7; color: #d63031; font-weight: bold; padding: 8px 15px; border-radius: 20px; font-size: 16px; display: inline-block; margin-bottom: 15px; border: 1px solid #fab1a0; }
        
        #question_num { font-size: 14px; color: #666; font-weight: 600; text-align: left; margin-bottom: 5px; }
        #question { font-size: 19px; font-weight: bold; color: #2c3e50; text-align: left; margin-bottom: 20px; line-height: 1.5; }
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { width: 100%; padding: 14px 20px; font-size: 16px; font-weight: 500; cursor: pointer; border: 2px solid #e0e0e0; border-radius: 8px; background: #fdfdfd; text-align: left; transition: all 0.2s ease; color: #333; }
        .option-btn:hover:not([disabled]) { background: #f0f4f8; border-color: #3498db; transform: translateY(-2px); }
        .option-btn.correct { background-color: #2ecc71 !important; border-color: #27ae60 !important; color: white !important; font-weight: bold; }
        .option-btn.wrong { background-color: #e74c3c !important; border-color: #c0392b !important; color: white !important; }
        #result-box { text-align: center; padding: 20px 0; }
        .score-text { font-size: 22px; color: #2c3e50; margin-bottom: 20px; }
        .restart-btn { background: #3498db; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: background 0.2s; }
        .restart-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>ગુજરાત જનરલ નોલેજ ક્વિઝ</h2>
    
    <div id="quiz-box">
        <!-- ટાઇમર ડિસ્પ્લે -->
        <div style="text-align: right;">
            <div class="timer-box">⏱️ સમય બાકી: <span id="time-left">૨૦</span> સેકન્ડ</div>
        </div>
        
        <p id="question_num">પ્રશ્ન: 1 / 10</p>
        <p id="question">પ્રશ્ન લોડ થઈ રહ્યો છે...</p>
        <div id="options" class="options-container"></div>
    </div>
    
    <div id="result-box" style="display: none;">
        <h3 style="font-size: 26px; margin-bottom: 10px;">🎉 ક્વિઝ પૂરી થઈ ગઈ!</h3>
        <p class="score-text" id="score-display">તમારો સ્કોર: 0 / 10</p>
        <button class="restart-btn" onclick="restartQuiz()">ફરીથી શરૂ કરો</button>
    </div>
</div>

<script>
    const quizData = [
        { question: "૧. ગુજરાતની સૌથી લાંબી નદી કઈ છે?", options: ["તાપી", "નર્મદા", "મહી", "સાબરમતી"], correct: 1 },
        { question: "૨. સાબરમતી આશ્રમની સ્થાપના કયા વર્ષમાં થઈ હતી?", options: ["૧૯૧૫", "૧૯૧运行", "૧૯૨૦", "૧૯૩૦"], correct: 1 },
        { question: "૩. ગુજરાતનું સૌથી મોટું બંદર કયું છે?", options: ["ભાવનગર", "પોરબંદર", "કંડલા", "વેરાવળ"], correct: 2 },
        { question: "૪. સ્ટેચ્યુ ઓફ યુનિટીની ઊંચાઈ કેટલી છે?", options: ["૧૫૨ મીટર", "૧૮૨ મીટર", "૨0૨ મીટર", "૧૭૨ મીટર"], correct: 1 },
        { question: "૫. ગુજરાતનું રાજ્ય પક્ષી કયું છે?", options: ["મોર", "પોપટ", "ફ્લેમિંગો (સુરખાબ)", "કબૂતર"], correct: 2 },
        { question: "૬. ગિરા ધોધ કયા જિલ્લામાં આવેલો છે?", options: ["ડાંગ", "વલસાડ", "નવસારી", "તાપી"], correct: 0 },
        { question: "૭. કીર્તિ તોરણ કયા શહેરમાં આવેલું છે?", options: ["પાટણ", "વડનગર", "જૂનાગઢ", "મોઢેરા"], correct: 1 },
        { question: "૮. અક્ષરધામ મંદિર કયા શહેરમાં આવેલું છે?", options: ["અમદાવાદ", "રાજકોટ", "ગાંધીનગર", "સુરત"], correct: 2 },
        { question: "૯. ગુજરાતમાં સૂર્યમંદિર ક્યાં આવેલું છે?", options: ["મોઢેરા", "અંબાજી", "સોમનાથ", "દ્વારકા"], correct: 0 },
        { question: "૧૦. ગીર રાષ્ટ્રીય ઉદ્યાન કયા પ્રાણી માટે પ્રખ્યાત છે?", options: ["વાઘ", "સિંહ", "દીપડો", "કાળિયાર"], correct: 1 }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timer; 
    let timeLeft = 20; // દરેક પ્રશ્ન માટે ૨૦ સેકન્ડ

    function startTimer() {
        timeLeft = 20;
        document.getElementById("time-left").innerText = timeLeft;
        
        // જૂનું ટાઇમર ક્લિયર કરવું
        clearInterval(timer);
        
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("time-left").innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                timeOutAction(); // સમય પૂરો થાય ત્યારે આ ફંક્શન રન થશે
            }
        }, 1000);
    }

    function loadQuiz() {
        const currentQuiz = quizData[currentQuestion];
        document.getElementById("question_num").innerText = `પ્રશ્ન: ${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById("question").innerText = currentQuiz.question;
        
        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = ""; 

        currentQuiz.options.forEach((option, index) => {
            const btn = document.createElement("button");
            btn.classList.add("option-btn");
            btn.innerText = option;
            btn.onclick = () => checkAnswer(btn, index);
            optionsContainer.appendChild(btn);
        });

        startTimer(); // પ્રશ્ન લોડ થતાં જ ટાઇમર શરૂ કરો
    }

    function checkAnswer(selectedBtn, selectedIndex) {
        clearInterval(timer); // ક્લિક કરતાં જ ટાઇમર અટકાવો
        const currentQuiz = quizData[currentQuestion];
        const allButtons = document.querySelectorAll(".option-btn");
        
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQuiz.correct) {
            selectedBtn.classList.add("correct");
            score++;
        } else {
            selectedBtn.classList.add("wrong");
            allButtons[currentQuiz.correct].classList.add("correct");
        }
        
        goToNextQuestion();
    }

    // જો સમય પૂરો થઈ જાય તો ઓટોમેટિક સાચો જવાબ બતાવો
    function timeOutAction() {
        const currentQuiz = quizData[currentQuestion];
        const allButtons = document.querySelectorAll(".option-btn");
        
        allButtons.forEach(btn => btn.disabled = true);
        // યુઝરે જવાબ નથી આપ્યો એટલે ફક્ત સાચો જવાબ લીલા રંગથી હાઇલાઇટ થશે
        allButtons[currentQuiz.correct].classList.add("correct");
        
        goToNextQuestion();
    }

    function goToNextQuestion() {
        currentQuestion++;
        setTimeout(() => {
            if (currentQuestion < quizData.length) {
                loadQuiz();
            } else {
                document.getElementById("quiz-box").style.display = "none";
                document.getElementById("result-box").style.display = "block";
                document.getElementById("score-display").innerHTML = `તમારો ફાઇનલ સ્કોર: <strong>${score} / ${quizData.length}</strong>`;
            }
        }, 1200);
    }

    function restartQuiz() {
        currentQuestion = 0;
        score = 0;
        document.getElementById("quiz-box").style.display = "block";
        document.getElementById("result-box").style.display = "none";
        loadQuiz();
    }

    loadQuiz();
</script>

</body>
</html>
